name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: "Emacs ${{ matrix.emacs-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - emacs-version: "28.1"
            continue-on-error: false
          - emacs-version: "29.4"
            continue-on-error: false
          - emacs-version: "30.1"
            continue-on-error: false
          - emacs-version: snapshot
            continue-on-error: true

    continue-on-error: ${{ matrix.continue-on-error }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Emacs ${{ matrix.emacs-version }}
        uses: jcs090218/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Set up Eask CLI
        uses: emacs-eask/setup-eask@master
        with:
          version: snapshot

      - name: Set up just
        uses: extractions/setup-just@v2

      - name: Cache Eask dependencies
        uses: actions/cache@v4
        with:
          path: .eask
          key: eask-${{ matrix.emacs-version }}-${{ hashFiles('Eask') }}
          restore-keys: |
            eask-${{ matrix.emacs-version }}-

      - name: Install package dependencies
        run: just install

      - name: Lint
        run: just lint

      - name: Test
        run: just test

      - name: Package
        run: just package

      - name: Upload dist artifact
        if: matrix.emacs-version != 'snapshot'
        uses: actions/upload-artifact@v4
        with:
          name: dist-emacs-${{ matrix.emacs-version }}
          path: dist/
          if-no-files-found: error
